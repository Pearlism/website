<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>419 R6 Tools</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Prevent scrolling */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: Arial, sans-serif;
            position: relative;
        }

        /* Full-screen background video */
        #backgroundVideo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures the video covers the whole screen */
            z-index: -1; /* Keep the video behind the content */
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
            z-index: 1; /* Make sure the text is on top */
        }

        h1 {
            font-size: 3em;
            color: magenta;
            text-shadow: 0 0 20px magenta, 0 0 30px magenta, 0 0 40px magenta;
        }

        .dropdown {
            position: relative;
            display: inline-block;
            margin-top: 20px;
        }

        .dropdown select {
            padding: 15px;
            font-size: 1.2em;
            background-color: black;
            color: white;
            border: 2px solid magenta;
            border-radius: 5px;
            outline: none;
            cursor: pointer;
            width: 250px;
            text-align: center;
            box-shadow: 0 0 5px magenta;
            transition: width 0.3s ease;
        }

        .dropdown select:focus {
            border-color: #ff3399;
            box-shadow: 0 0 10px magenta;
            width: 300px; /* Animates the dropdown to expand when focused */
        }

        .buttons {
            display: none;
            margin-top: 30px;
        }

        .button {
            display: inline-block;
            padding: 15px 30px;
            margin: 10px;
            font-size: 1.2em;
            border: 2px solid magenta;
            border-radius: 10px;
            background-color: black;
            color: magenta;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .button:hover {
            background-color: magenta;
            color: black;
            box-shadow: 0 0 10px magenta;
        }

        .button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <!-- Background Video -->
    <video id="backgroundVideo" autoplay loop>
        <source src="vid.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <div class="container">
        <h1>419 R6 Tools</h1>
        <div class="dropdown">
            <select id="toolsDropdown" onchange="showButtons()">
                <option value="" disabled selected>Select a tool</option>
                <option value="Chat Spammer">Chat Spammer</option>
                <option value="Coming Soon..">Coming Soon..</option>
            </select>
        </div>

        <div id="buttonsContainer" class="buttons">
            <a href="#" class="button" id="downloadButton" target="_blank">Download</a>
            <a href="#" class="button" id="previewButton" target="_blank">Preview</a>
        </div>
    </div>

    <script>
        // Function to show buttons when a tool is selected
        function showButtons() {
            var selectedTool = document.getElementById("toolsDropdown").value;
            var buttonsContainer = document.getElementById("buttonsContainer");

            if (selectedTool) {
                buttonsContainer.style.display = 'block';

                // Change the button actions based on the selected tool
                if (selectedTool === 'Chat Spammer') {
                    document.getElementById('downloadButton').href = 'https://github.com/Pearlism/website/raw/refs/heads/master/Chat%20Spammer.py';
                    document.getElementById('previewButton').href = 'https://www.youtube.com';
                } else if (selectedTool === 'Coming Soon..') {
                    document.getElementById('downloadButton').href = 'h';
                    document.getElementById('previewButton').href = 'h';
                }
            } else {
                buttonsContainer.style.display = 'none';
            }
        }

        // Ensure the video audio plays after user interaction
        window.onload = function() {
            var video = document.getElementById('backgroundVideo');
            var hasInteracted = false;

            // Play video and audio on click
            document.body.addEventListener('click', function() {
                if (!hasInteracted) {
                    video.play();
                    hasInteracted = true;
                    console.log("Video and audio are playing");
                }
            });

            // Optionally, you can add a keydown event for more interaction
            document.body.addEventListener('keydown', function() {
                if (!hasInteracted) {
                    video.play();
                    hasInteracted = true;
                    console.log("Video and audio are playing");
                }
            });
        };
    </script>

</body>
</html>
