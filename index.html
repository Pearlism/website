<!DOCTYPE html>
<html lang="en">
    <head>
    <link rel="shortcut icon" type="image/x-icon" href="pearl.ico" />
  </head>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>@landen.419</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <script src="https://kit.fontawesome.com/6dbcb3829c.js" crossorigin="anonymous"></script>
    <style>
        body {
            background-color: black;
            cursor: url('cur.cur'), auto;
        }

        #hero video {
            height: 100vh;
            width: 100%;
            background-position: absolute;
            z-index: 10;
            object-fit: cover;
        }

        #hero .content {
            background: rgba(0,0,0,0.7);
            height: 100%;
            width: 100%;
            z-index: 20;
            position: absolute;
            top: 0;
            left: 0;
        }

        h1 {
            color: rgb(162, 0, 255);
            padding-bottom: 6px;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            20%, 10%, 0% {
                text-shadow: 0 0 5px rgb(162, 0, 255), 0 0 20px #e100ff, 0 0 30px #e100ff, 0 0 40px #e100ff;
            }
        }

        /* TikTok overlay */
        #tiktok-overlay {
            position: absolute;
            top: 5%;
            right: 5%;
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            color: white;
            font-family: 'Oswald', sans-serif;
        }

        .stat {
            font-size: 18px;
            margin-bottom: 10px;
        }

        /* Eye icon and viewer count styling */
        #viewer-count {
            font-size: 18px;
            position: absolute;
            bottom: 5%;
            left: 5%;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
        }

            #viewer-count i {
                color: rgb(162, 0, 255);
            }

        /* Switch styling */
        .switch {
            position: absolute;
            display: inline-block;
            width: 60px;
            height: 34px;
            left: 5%;
            top: 3%;
        }

            .switch input {
                opacity: 0;
                width: 0;
                height: 0;
            }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
            box-shadow: 0 0 5px #4400ff, 0 0 15px #4400ff, 0 0 25px #4400ff, 0 0 35px #4400ff;
            animation: button-glow 2s infinite ease-in-out;
        }

            .slider:before {
                position: absolute;
                content: "";
                height: 26px;
                width: 26px;
                left: 4px;
                bottom: 4px;
                background-color: white;
                transition: .4s;
                border-radius: 50%;
            }

        input:checked + .slider {
            background-color: #4400ff;
        }

            input:checked + .slider:before {
                transform: translateX(26px);
            }

        /* Glowing effect for the slider */
        @keyframes button-glow {
            0%, 100% {
                box-shadow: 0 0 5px #6200ff, 0 0 15px #6200ff, 0 0 25px #6200ff, 0 0 35px #6200ff;
            }

            50% {
                box-shadow: 0 0 10px #4400ff, 0 0 20px #4400ff, 0 0 30px #4400ff, 0 0 40px #4400ff;
            }
        }

        /* Glowing text effect */
        #button-text {
            animation: text-glow 2s infinite ease-in-out;
        }

        @keyframes text-glow {
            0%, 100% {
                text-shadow: 0 0 5px #6200ff, 0 0 15px #6200ff, 0 0 25px #6200ff, 0 0 35px #6200ff;
            }

            50% {
                text-shadow: 0 0 10px #4400ff, 0 0 20px #4400ff, 0 0 30px #4400ff, 0 0 40px #4400ff;
            }
        }

        /* Icons styling */
        .icons {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

            .icons a {
                color: rgb(48, 0, 161);
                transition: color 0.3s;
            }

                .icons a:hover {
                    color: #740083;
                }
    </style>
</head>
<body>
    <div id='hero'>
        <video class="giphy" autoplay loop muted playsinline>
            <source src="vid.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div class="content d-flex align-items-center">
            <div id="center" class="container text-center">
                <h1>Landen.419</h1>
                <span class="icons">
    <span id="block">
        <a href="https://discord.gg/invite/7t7bbXW76J" target="_blank"><i class="fab fa-discord fa-2x"></i></a>
    </span>
    <span id="block">
        <a href="https://github.com/pearlism" target="_blank"><i class="fab fa-github fa-2x"></i></a>
    </span>
    <span id="block">
        <a href="https://www.tiktok.com/@landen.419" target="_blank"><i class="fab fa-tiktok fa-2x"></i></a>
    </span>
    <span id="block">
        <a href="https://www.instagram.com/landen.419/" target="_blank"><i class="fab fa-instagram fa-2x"></i></a>
    </span>
</span>
                <a href="about.html" a>
                    <button class="btn btn-primary mt-4 glow-button">More</button>
                </a>
                <!-- Viewer count section -->
                <div id="viewer-count">
                    <i class="fas fa-eye"></i>
                    <span id="view-count">2,836</span> Views
                </div>
            </div>

            <div>
                <p id="button-text" class="switch" style="color:#6200ff; margin-left:6px; margin-top: 45px;">Click me</p>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider round"></span>
                    <audio id="myaudio"> <source src="bhonest.mp3" type="audio/mp3"> </audio>
                </label>
            </div>
        </div>

        <!-- TikTok Stats Overlay -->
        <div id="tiktok-overlay">
            <h3>TikTok</h3>
            <div class="stat">Followers: <span id="followers-count">28.7K</span></div>
            <div class="stat">Likes: <span id="likes-count">1M</span></div>
            <div class="stat">
                <a href="https://www.tiktok.com/@landen.419" target="_blank">
                    <button class="tiktok-btn">@landen.419</button>
                </a>
            </div>
        </div>

        <script src="https://code.jquery.com/jquery-3.5.1.min.js" crossorigin="anonymous"></script>
        <script>
            $(document).ready(function () {
                var myAudio = document.getElementById("myaudio");
                var more = 0;
                $('.round').click(function () {
                    if (more % 2 === 0) {
                        $(myAudio)[0].play();
                        $('#button-text').text(' ');
                    } else {
                        $(myAudio)[0].pause();
                        $('#button-text').text('');
                    }
                    more++;
                });
            });
        </script>

</body>
</html>
